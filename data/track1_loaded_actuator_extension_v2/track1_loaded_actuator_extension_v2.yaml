recommended_track1_interpretation:
  knee_pitch: 'Strongest loaded correction candidate: pronounced speed saturation
    plus persistent stand-return effort asymmetry.'
  hip_pitch: Strong speed-dependent tracking degradation and velocity saturation;
    directional tracking asymmetry is comparatively small.
  ankle_pitch: Speed-sensitive response and declining speed gain. The earlier broad
    stand-return penalty is not persistent across the updated-pose speed sweep.
  roll_families: Milder loaded response; use conservative family randomization or
    validation rather than aggressive direction conditioning.
  hip_yaw: Use cautiously because movement amplitudes are smaller and the speed sweep
    is less informative for this family.
